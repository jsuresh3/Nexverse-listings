<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexverse — Sign in</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-shell">
  <div class="login-card">

    <!-- LOGIN FORM -->
    <div id="login-view">
      <div class="login-brand">NEX<span>VERSE</span></div>
      <div class="login-sub">Showing Checklist — sign in to continue</div>

      <div class="login-error" id="login-error">Incorrect username or password.</div>

      <form id="login-form" autocomplete="off">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <button class="btn-link" id="show-reset">Forgot password?</button>
    </div>

    <!-- RESET FORM -->
    <div id="reset-view" class="hidden">
      <div class="back-row">
        <button id="back-to-login">&larr; Back to sign in</button>
      </div>
      <div class="login-brand">RESET <span>PASSWORD</span></div>
      <div class="login-sub">This resets the password for the Nexverse account on this device.</div>

      <div class="login-error" id="reset-error">Please fill in all fields correctly.</div>
      <div class="login-success" id="reset-success">Password updated. You can sign in now.</div>

      <form id="reset-form" autocomplete="off">
        <div class="field">
          <label for="reset-username">Username</label>
          <input type="text" id="reset-username" placeholder="Username" required>
        </div>
        <div class="field">
          <label for="reset-new-password">New password</label>
          <input type="password" id="reset-new-password" placeholder="At least 6 characters" required>
        </div>
        <div class="field">
          <label for="reset-confirm-password">Confirm new password</label>
          <input type="password" id="reset-confirm-password" placeholder="Repeat new password" required>
        </div>
        <button type="submit" class="btn-primary">Update password</button>
      </form>
    </div>

  </div>
</div>

<script src="api-client.js"></script>
<script src="login.js"></script>
</body>
</html>
